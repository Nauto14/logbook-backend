services:
  - type: web
    name: ai-physics-logbook-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./logbook.db
      - key: CORS_ORIGINS
        value: https://logbook-frontend.vercel.app
